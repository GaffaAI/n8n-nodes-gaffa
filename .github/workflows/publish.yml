# Publishes this n8n community node package to npm on every push to main.
#
# Starting May 1 2026, n8n requires community nodes to be published via
# GitHub Actions with npm provenance. This workflow satisfies that. Provenance
# lets anyone cryptographically verify the package was built by this workflow,
# from this repository and commit.
#
# The published version is whatever package.json says. Bump it in your PR.
# If the version was not bumped, npm rejects the duplicate version and this run
# fails, which is the reminder to bump. Otherwise it publishes.
#
# Authentication: OIDC trusted publishing if configured on npm (no secret), or
# an NPM_TOKEN repository secret as a fallback. Both work with provenance.

name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      # Required to mint an OIDC token for npm provenance attestation.
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: |
          [ -n "$NPM_TOKEN" ] && npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm publish --provenance --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
